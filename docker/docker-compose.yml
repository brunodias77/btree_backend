services:
  postgres:
    image: postgres:17-alpine
    container_name: btree-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-btree}
      POSTGRES_USER: ${POSTGRES_USER:-btree}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-btree}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-btree} -d ${POSTGRES_DB:-btree}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
    driver: local
